<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" fill="none">
  <defs>
    <!-- Blue gradient for C letter and "Craft" text -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a3a"/>
      <stop offset="40%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#29b6f6"/>
    </linearGradient>
    <!-- Dark navy for D letter -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#1a2e4a"/>
    </linearGradient>
    <!-- Pixel dots gradient (cyan) -->
    <linearGradient id="pixelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- ═══ D LETTER (dark navy) ═══ -->
  <!-- Outer D shape -->
  <path d="M18 8 L18 82 L38 82 Q72 82 72 45 Q72 8 38 8 Z" fill="url(#darkGrad)"/>
  <!-- Inner cutout to make D hollow look -->
  <path d="M32 22 L32 68 L40 68 Q56 68 56 45 Q56 22 40 22 Z" fill="#0a1118"/>
  <!-- Diagonal cut at bottom-right of D -->
  <path d="M18 72 L30 82 L18 82 Z" fill="#1a2e4a"/>

  <!-- ═══ C LETTER (blue gradient) ═══ -->
  <!-- C outer arc - top arm -->
  <path d="M58 18 Q58 8 70 8 L90 8 Q102 8 108 18 L96 28 Q93 22 88 22 L72 22 Q65 22 65 30 L65 36 L52 36 Q52 24 58 18 Z" fill="url(#blueGrad)"/>
  <!-- C outer arc - bottom arm -->
  <path d="M52 54 L65 54 L65 60 Q65 68 72 68 L88 68 Q93 68 96 62 L108 72 Q102 82 90 82 L70 82 Q58 82 58 72 Q52 66 52 54 Z" fill="url(#blueGrad)"/>
  <!-- C middle bar connector -->
  <path d="M52 36 L65 36 L65 54 L52 54 Z" fill="url(#blueGrad)"/>
  <!-- C gap (white/transparent opening on right) - already open by shape -->

  <!-- ═══ PIXEL DOTS (top right of C, cyan scattered squares) ═══ -->
  <!-- Row 1 (top) -->
  <rect x="110" y="6"  width="7" height="7" rx="1" fill="#29b6f6" opacity="0.9"/>
  <rect x="120" y="6"  width="7" height="7" rx="1" fill="#4fc3f7" opacity="0.7"/>
  <!-- Row 2 -->
  <rect x="115" y="16" width="6" height="6" rx="1" fill="#29b6f6" opacity="0.8"/>
  <rect x="124" y="14" width="5" height="5" rx="1" fill="#81d4fa" opacity="0.5"/>
  <!-- Row 3 -->
  <rect x="120" y="24" width="5" height="5" rx="1" fill="#4fc3f7" opacity="0.4"/>

  <!-- ═══ BRAND NAME TEXT ═══ -->
  <!-- "Digital" in dark navy -->
  <text x="8" y="112" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="28" 
        font-weight="800" 
        fill="#0d1b2e" 
        letter-spacing="-0.5">Digital</text>
  <!-- "Craft" in blue gradient via fill -->
  <text x="106" y="112" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="28" 
        font-weight="800" 
        fill="#1565c0"
        letter-spacing="-0.5">Craft</text>

  <!-- ═══ TAGLINE ═══ -->
  <!-- Left dash -->
  <line x1="8" y1="122" x2="36" y2="122" stroke="#1565c0" stroke-width="1.5"/>
  <!-- Tagline text -->
  <text x="42" y="126" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="9.5" 
        font-weight="600" 
        fill="#1a2e4a" 
        letter-spacing="2.5">WE BUILD DIGITAL SUCCESS</text>
  <!-- Right dash -->
  <line x1="272" y1="122" x2="300" y2="122" stroke="#1565c0" stroke-width="1.5"/>
</svg>
